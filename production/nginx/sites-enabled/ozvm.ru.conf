
server {
    listen 80;
    server_name ozvm.ru www.ozvm.ru;  
    
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/acme-challenge/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ozvm.ru www.ozvm.ru;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/acme-challenge/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    ssl_certificate /etc/letsencrypt/live/ozvm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ozvm.ru/privkey.pem;

    location / {
        proxy_pass http://ozvmru:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
